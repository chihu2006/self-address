name: Fetch China TV M3U

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"  # every 24 hours

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create target directory
        run: mkdir -p rawaddress

      - name: Download M3U file
        run: |
          curl -L \
            "https://live.264788.xyz/sub/02RqbaNCNBeldNn15gDj2xumpI7U3N" \
            -o rawaddress/chinatv.m3u

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add rawaddress/chinatv.m3u

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Update chinatv.m3u"
          git push
