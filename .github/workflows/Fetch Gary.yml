name: Fetch Gary M3U via Proxy

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *" # every 24 hours

concurrency:
  group: fetch-gary-m3u
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  fetch-m3u:
    runs-on: ubuntu-latest

    env:
      URL: "https://garyshare.sharewithyou.dpdns.org/garyshare_goal.m3u"
      OUTPUT: "rawaddress/gary.m3u"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Fetch proxy list
        run: |
          echo "Fetching HTTP proxy list from Proxifly..."
          PROXY_LIST_URL="https://cdn.jsdelivr.net/gh/proxifly/free-proxy-list@main/proxies/protocols/http/data.json"

          curl -s "$PROXY_LIST_URL" -o /tmp/all_proxies.json

          # Extract up to 600 proxies
          jq -r '.[0:600] | .[] | "\(.ip):\(.port)"' /tmp/all_proxies.json > /tmp/test_proxies.txt

      - name: Validate proxies and fetch M3U
        run: |
          set -euo pipefail

          LIGHT_URL="https://www.google.com/generate_204"
          CONNECT_URL="https://www.google.com/generate_204"
          OUTPUT_FILE="$OUTPUT"

          mkdir -p "$(dirname "$OUTPUT_FILE")"

          BATCH_SIZE=50
          TOTAL_PROXIES=$(wc -l < /tmp/test_proxies.txt)
          BATCHES=$(( (TOTAL_PROXIES + BATCH_SIZE - 1) / BATCH_SIZE ))

          FETCH_SUCCESS=false

          for ((i=0; i<BATCHES; i++)); do
            echo "Processing batch $((i+1)) of $BATCHES"

            START=$((i * BATCH_SIZE + 1))
            END=$((START + BATCH_SIZE - 1))

            sed -n "${START},${END}p" /tmp/test_proxies.txt > /tmp/batch.txt

            LIGHT_OK_FILE="/tmp/light_ok.txt"
            > "$LIGHT_OK_FILE"

            while read -r PROXY; do
              [ -z "$PROXY" ] && continue

              echo "[Light] Testing $PROXY"

              if curl --silent --fail --max-time 5 \
                -x "http://$PROXY" \
                "$LIGHT_URL" >/dev/null 2>&1; then

                echo "$PROXY" >> "$LIGHT_OK_FILE"
                echo "✅ Light OK"
              else
                echo "❌ Light failed"
              fi

              sleep 0.3
            done < /tmp/batch.txt

            BATCH_WORKING="/tmp/batch_working.txt"
            > "$BATCH_WORKING"

            while read -r PROXY; do
              [ -z "$PROXY" ] && continue

              echo "[CONNECT] Testing $PROXY"

              if curl --silent --fail --head --max-time 10 \
                -x "http://$PROXY" \
                "$CONNECT_URL" >/dev/null 2>&1; then

                echo "$PROXY" >> "$BATCH_WORKING"
                echo "✅ CONNECT OK"
              else
                echo "❌ CONNECT failed"
              fi

              sleep 0.5
            done < "$LIGHT_OK_FILE"

            if [ ! -s "$BATCH_WORKING" ]; then
              echo "No working proxies in this batch."
              continue
            fi

            while [ -s "$BATCH_WORKING" ]; do
              PROXY=$(head -n1 "$BATCH_WORKING")

              echo "Fetching M3U using $PROXY"

              if curl --fail --location --max-time 10 \
                -x "http://$PROXY" \
                -A "VLC/3.0.18 LibVLC/3.0.18" \
                -o "${OUTPUT_FILE}.tmp" \
                "$URL"; then

                {
                  echo '#EXTM3U x-tvg-url="https://raw.githubusercontent.com/chihu2006/iptv-api/refs/heads/master/output/epg/epg.gz"'
                  tail -n +2 "${OUTPUT_FILE}.tmp"
                } > "$OUTPUT_FILE"

                rm -f "${OUTPUT_FILE}.tmp"

                echo "PROXY=$PROXY" >> "$GITHUB_ENV"

                FETCH_SUCCESS=true
                break 2

              else
                echo "Proxy failed."

                sed -i '1d' "$BATCH_WORKING"
                rm -f "${OUTPUT_FILE}.tmp"
              fi
            done
          done

          if [ "$FETCH_SUCCESS" = false ]; then
            echo "🚨 Unable to fetch playlist."
            exit 1
          fi

      - name: Commit and push if changed
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "$OUTPUT"

          if git diff --cached --quiet; then
            echo "No changes detected."
            exit 0
          fi

          git commit -m "Update gary.m3u"

          for i in 1 2 3; do
            echo "Push attempt $i"

            git fetch origin main
            git rebase origin/main

            if git push origin HEAD:main; then
              echo "✅ Push successful."
              exit 0
            fi

            echo "Push failed. Retrying in 5 seconds..."
            sleep 5
          done

          echo "❌ Failed to push after 3 attempts."
          exit 1
